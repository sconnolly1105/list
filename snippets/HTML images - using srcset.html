<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;   
        }
        img {
            width: 100%;
        }
    </style>
</head>
<body>
    <picture>
            <source media="(min-width: 760px)"
                srcset="images/image-800x300.jpg">
            <source media="(min-width: 500px)"
                srcset="images/image-500x800.jpg">
            <img src="images/image-300x600.jpg" alt="Picture of me">
    </picture>
</body>
</html>
