<html>
<head>
<style>
.box {
    width: 100px;
    height: 100px;
	z-index: -9;
    background: red;
    -webkit-transition: transform 5s; /* For Safari 3.1 to 6.0 */
    transition: transform 5s;
}

.box:hover {
    transform:translate(0px,600px);
}

.colour {
	z-index: 9;
	height: 300px;
    background: blue;
    color: #fff;
}

</style>
</head>
<body>

<p><b>Note:</b> This example does not work in Internet Explorer 9 and earlier versions.</p>

<div class="box"></div>

<p class="colour">Hover over the div element above, to see the transition effect.</p>

</body>
</html>
