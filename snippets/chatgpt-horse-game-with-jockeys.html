<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horse Racing Game</title>
  <style>
    :root {
      --track-color: #f5f5f5;
      --lane-line: #d5d5d5;
      --accent: #8c5feb;
      --text-color: #1f2933;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eef1f9 0%, #f8fafc 100%);
      color: var(--text-color);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app-shell {
      width: min(1100px, 100%);
      background: #fff;
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 24px;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: -0.5px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    label {
      font-weight: 600;
    }

    input[type="number"] {
      width: 80px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #cfd5e2;
      font-size: 16px;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(140, 95, 235, 0.2);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      box-shadow: none;
    }

    button:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(140, 95, 235, 0.25);
    }

    .race-area {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: stretch;
    }

    .track-wrapper {
      position: relative;
      background: var(--track-color);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #e4e8f0;
      min-height: 420px;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .lanes {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    .lane {
      flex: 1;
      position: relative;
      border-bottom: 1px dashed var(--lane-line);
      padding-left: 18px;
    }

    .lane:last-child {
      border-bottom: none;
    }

    .horse {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 90px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 4px 6px;
      background: transparent;
      border: none;
      box-shadow: none;
      min-width: 0;
    }

    .horse-figure {
      position: relative;
      width: 140px;
      height: 90px;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.18));
      flex-shrink: 0;
    }

    .rump-number {
      position: absolute;
      right: 24px;
      top: 32px;
      width: 30px;
      height: 30px;
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid #111827;
      color: #111827;
      font-weight: 800;
      border-radius: 50%;
      display: grid;
      place-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
      font-size: 14px;
    }

    .name {
      font-weight: 700;
      color: #0f172a;
      white-space: nowrap;
      padding: 6px 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid #dfe3ef;
      box-shadow: var(--shadow);
    }

    .finish-line {
      position: absolute;
      top: 0;
      right: 60px;
      width: 20px;
      height: 100%;
      background-image: linear-gradient(45deg, #000 25%, transparent 25%, transparent 50%, #000 50%, #000 75%, transparent 75%, transparent);
      background-size: 20px 20px;
      mix-blend-mode: multiply;
      opacity: 0.55;
    }

    .finish-label {
      position: absolute;
      top: 8px;
      right: 20px;
      background: rgba(15, 23, 42, 0.9);
      color: #fff;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .results {
      background: linear-gradient(135deg, #0ea86f, #0b9563);
      color: #e8fff4;
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      align-self: stretch;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .results h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.3px;
    }

    .results-status {
      font-weight: 700;
      background: rgba(255, 255, 255, 0.16);
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    .result-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      min-height: 48px;
    }

    .result-list:empty::after {
      content: "Results will appear here as soon as horses finish.";
      display: block;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.12);
      padding: 10px 12px;
      border-radius: 10px;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .result-item strong {
      font-size: 16px;
      min-width: 40px;
    }

    .result-horse {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .mini-figure {
      width: 46px;
      height: 30px;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      position: relative;
      filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.25));
      flex-shrink: 0;
    }

    .mini-figure .rump-number {
      width: 22px;
      height: 22px;
      font-size: 12px;
      right: 2px;
      top: 2px;
      border-width: 1.5px;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.18);
    }

    .status {
      margin-left: auto;
      font-weight: 800;
    }

    .banner {
      margin-top: 6px;
      color: #55607a;
      font-size: 14px;
    }

    .results-note {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.88);
    }

    @media (max-width: 960px) {
      .race-area {
        grid-template-columns: 1fr;
      }

      .results {
        order: 2;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <h1>🏇 QuickDraw Horse Race</h1>
    <form class="controls" id="race-form">
      <label for="horse-count">Number of horses:</label>
      <input id="horse-count" name="horse-count" type="number" min="2" max="12" value="6" required />
      <button id="start-btn" type="submit">Start race</button>
      <button id="reset-btn" type="button" disabled>Reset</button>
    </form>
    <div class="banner">Choose the field size, hit start, and watch the battle for the finish line.</div>

    <div class="race-area">
      <div class="track-wrapper">
        <div class="lanes" id="lanes"></div>
        <div class="finish-line"></div>
        <div class="finish-label">Finish</div>
      </div>

      <section class="results" id="results">
        <div class="results-header">
          <h2>Race results</h2>
          <span class="results-status" id="results-status">Waiting for race</span>
        </div>
        <ol class="result-list" id="result-list"></ol>
        <div class="results-note">Results update automatically once every horse crosses the finish.</div>
      </section>
    </div>
  </div>

  <script>
    const form = document.getElementById("race-form");
    const lanes = document.getElementById("lanes");
    const startBtn = document.getElementById("start-btn");
    const resetBtn = document.getElementById("reset-btn");
    const results = document.getElementById("results");
    const resultsStatus = document.getElementById("results-status");
    const resultList = document.getElementById("result-list");

    const horses = [];
    let raceInterval = null;
    let finished = [];
    let startTime = 0;
    let finishX = 0;

    const HORSE_ICONS = [
      "https://upload.wikimedia.org/wikipedia/commons/6/69/Horse_jockey_silhouette.svg",
      "https://upload.wikimedia.org/wikipedia/commons/1/1f/Horse_racing_silhouette.svg",
      "https://upload.wikimedia.org/wikipedia/commons/9/9d/Horse_racing_silhouette.svg"
    ];

    function formatTime(ms) {
      return (ms / 1000).toFixed(2) + "s";
    }

    function resetRace() {
      clearInterval(raceInterval);
      raceInterval = null;
      horses.length = 0;
      finished = [];
      lanes.innerHTML = "";
      resultList.innerHTML = "";
      startBtn.disabled = false;
      resetBtn.disabled = true;
      resultsStatus.textContent = "Waiting for race";
    }

    function createHorse(id, laneHeight) {
      const lane = document.createElement("div");
      lane.className = "lane";

      const horse = document.createElement("div");
      horse.className = "horse";
      horse.style.top = `${(laneHeight / 2) - 45}px`;

      const figure = document.createElement("div");
      figure.className = "horse-figure";
      figure.style.backgroundImage = `url(${HORSE_ICONS[(id - 1) % HORSE_ICONS.length]})`;

      const rump = document.createElement("div");
      rump.className = "rump-number";
      rump.textContent = id;
      figure.appendChild(rump);

      const name = document.createElement("span");
      name.className = "name";
      name.textContent = `Horse ${id}`;

      horse.appendChild(figure);
      horse.appendChild(name);

      lane.appendChild(horse);
      lanes.appendChild(lane);

      horses.push({
        id,
        el: horse,
        lane,
        x: 0,
        finished: false,
        finishTime: null,
      });
    }

    function layOutLanes(count) {
      lanes.innerHTML = "";
      const wrapperHeight = Math.max(90 * count, 360);
      lanes.style.minHeight = `${wrapperHeight}px`;
      for (let i = 1; i <= count; i++) {
        createHorse(i, wrapperHeight / count);
      }
    }

    function startRace(e) {
      e.preventDefault();
      const count = Number(document.getElementById("horse-count").value);
      if (!Number.isInteger(count) || count < 2 || count > 12) {
        alert("Please choose between 2 and 12 horses.");
        return;
      }
      resetRace();
      layOutLanes(count);
      startBtn.disabled = true;
      resetBtn.disabled = false;
      resultsStatus.textContent = "Running...";

      const trackRect = lanes.getBoundingClientRect();
      finishX = trackRect.width - 100; // leave space for finish line visual
      startTime = performance.now();

      raceInterval = setInterval(tick, 60);
    }

    function tick() {
      const now = performance.now();
      let activeHorses = 0;

      horses.forEach((horse) => {
        if (horse.finished) return;
        activeHorses += 1;

        const speed = Math.random() * 2.2 + 1.2; // random boost every frame
        horse.x += speed;
        horse.el.style.transform = `translate(${horse.x}px, -50%)`;

        if (horse.x >= finishX) {
          horse.finished = true;
          horse.finishTime = now - startTime;
          horse.el.style.transform = `translate(${finishX}px, -50%)`;
          finished.push(horse);
        }
      });

      if (activeHorses === 0) {
        clearInterval(raceInterval);
        raceInterval = null;
        showResults();
      }
    }

    function showResults() {
      resultList.innerHTML = "";
      finished
        .sort((a, b) => a.finishTime - b.finishTime)
        .forEach((horse, index) => {
          const li = document.createElement("li");
          li.className = "result-item";
          const place = index + 1;
          const iconUrl = HORSE_ICONS[(horse.id - 1) % HORSE_ICONS.length];

          li.innerHTML = `
            <strong>${place}${ordinalSuffix(place)}</strong>
            <div class="result-horse">
              <div class="mini-figure" style="background-image: url(${iconUrl});">
                <div class="rump-number">${horse.id}</div>
              </div>
              <span>Horse ${horse.id}</span>
            </div>
            <span class="status">${formatTime(horse.finishTime)}</span>
          `;
          resultList.appendChild(li);
        });
      resultsStatus.textContent = "Finished";
    }

    function ordinalSuffix(n) {
      const j = n % 10, k = n % 100;
      if (j === 1 && k !== 11) return "st";
      if (j === 2 && k !== 12) return "nd";
      if (j === 3 && k !== 13) return "rd";
      return "th";
    }

    form.addEventListener("submit", startRace);
    resetBtn.addEventListener("click", resetRace);
  </script>
</body>
</html>
