<!DOCTYPE html>
<html>
<head>
    <title>Text Styling Example</title>
    <!-- Include Tailwind CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body style="position:relative; text-align:center;">
    <p class="text-red-700">This text is red</p>
    <p class="text-green-700">This text is green</p>
    <p class="text-blue-500">This text is blue</p>
</body>
</html>
