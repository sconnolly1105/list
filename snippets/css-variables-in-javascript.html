<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h2>Access  CSS variables using javascript</h2>
    <h4>Choose a colour from the picker to change the box colour</h4>
    <h6>This is done by grabbing the CSS variable and changing it</h6>
    <div class="color-picker__wrapper">
        <input type="color" name="color-picker" id="color-picker">
    </div>

    <div class="container">
        <div class="heading"></div>
    </div>

</body>

<style>
:root {
    --bg-color: #fafa07;
}
h2, h4, h6 {
    text-align: center;
}
.color-picker__wrapper {
    width: 80vw;
    margin: 2em auto;
    text-align: center;
}
.container {
    width: 80vw;
    margin: 15px auto;
    background-color: var(--bg-color);
}
#color-picker {
    margin-bottom: 2em;
}
.heading {
    margin-top: 1em;
    height: 400px;
    width: 100%;
}
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {

        const body = document.body;
        const bodyStyles = getComputedStyle(body);
//        console.log (bodyStyles);
        const bodyBg = getComputedStyle(body).getPropertyValue('background-color');
 //       console.log (`bodyBg: ${bodyBg}`);
        const root = document.querySelector(':root');
        const containerBg = getComputedStyle(root).getPropertyValue('--bg-color');

//        console.log (`containerBg: ${containerBg}`)
        
//        root.style.setProperty('--bg-color', '#ff0000');

        const colorChanger = document.querySelector ('input[type=color');

        colorChanger.addEventListener('change', e => {
//            alert (`Color change to: ${e.target.value}`);
            root.style.setProperty('--bg-color', e.target.value);
        });


    });
</script>

</html>
