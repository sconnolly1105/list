<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>This only works with a server so use the Live Server with Visual Studio</h2>
    <h2><a href="https://www.youtube.com/watch?v=qBg8IB3u28s&t=291s">Watch the YouTube video</a><h2>
    <table class="table">
        <thead></thead>
        <tbody></tbody>
    </table>
<script>
    async function loadIntoTable(url, table) {

        const tableHead = table.querySelector("thead");
        const tableBody = table.querySelector("tbody");
        const response = await fetch (url);
        const data = await response.json();
        const {headers, rows} = data; // destructure the data object

        // clear the table
        tableHead.innerHTML = '<tr><tr>';
        tableBody.innerHTML = '';

        // polulate the headers and rows
        for (const headerText of headers) {
            const headerElement = document.createElement('th');
            headerElement.textContent = headerText;
            tableHead.querySelector('tr').appendChild(headerElement);
        }

        // populate the table rows
        for (const row of rows) {
            const rowElement = document.createElement('tr');
            for (const cellText of row) {
                const cellElement = document.createElement('td');
                cellElement.textContent = cellText;
                rowElement.appendChild(cellElement);
            }
            tableBody.appendChild(rowElement);
        }    

    }

    loadIntoTable ('data.json' , document.querySelector ("table"));

</script>

<style>
    h2 {
        text-align: center;
    }
    table {
        margin: 2em auto;
       border-collapse: collapse;
       font-family: 'Quicksand', sans-serif;
       overflow: hidden;
       font-weight: bold;
    }
    thead th {
        background: #009578;
        color: #fff;
    }
    td, th {
        padding: 10px 10px;
    }
    tr:nth-last-of-type(even) {
        background-color: #eeeeee;
    }
    tr:last-of-type {
        border-bottom: 2px solid #009578;
    }
</style>

</body>
</html>
