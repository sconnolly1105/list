<!doctype html>

<html lang="en">

<head>

<meta charset="utf-8">

<title></title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="author" content="S, Connolly" />
<meta name="description" content="Create a star using css" />

</head>

<body>

<div class="star-wrapper">
  <div id="star-five"></div>
</div>

</body>

<style>
.star-wrapper {
  width 20%;
  margin: auto;
}
#star-five {
  margin: 200px;
  position: relative;
  display: block;
  color: red;
  width: 0px;
  height: 0px;
  border-right: 100px solid transparent;
  border-bottom: 70px solid red;
  border-left: 100px solid transparent;
  transform: rotate(35deg);
}
#star-five:before {
  border-bottom: 80px solid red;
  border-left: 30px solid transparent;
  border-right: 30px solid transparent;
  position: absolute;
  height: 0;
  width: 0;
  top: -45px;
  left: -65px;
  display: block;
  content: '';
  transform: rotate(-35deg);
}
#star-five:after {
  position: absolute;
  display: block;
  color: red;
  top: 3px;
  left: -105px;
  width: 0px;
  height: 0px;
  border-right: 100px solid transparent;
  border-bottom: 70px solid red;
  border-left: 100px solid transparent;
  transform: rotate(-70deg);
  content: '';
}

</style>

</html>
