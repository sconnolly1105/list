      <style>
        /* header deatils */
        .product-filter {
            display: flex;
        } 
        .product-filter h1 {
            flex-grow: 1;
        }
        .sort {
            display: flex;
        }
        .collection-sort {
            display: flex;
            flex-direction: column;
        }
        
        /* Product details */
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }  
        .product-card {
            padding: 2%;
            flex-grow: 1;
            flex-basis: 16%;

            border: 1px solid #d1d1d1;
            box-shadow: -4px 4px 10px #d5d4d4;
            border-radius: 8px;

            display: flex; /* so child elements can use flexbox stuff too! */
            flex-direction: column;
        }
        /* Stretch the last dummy cell to take up the remaining space. See above note. */
        .product-card:last-child {
            flex-grow: 10;
            border: none;
            box-shadow: none;
        }    
        .product-image img {
            max-width: 100%;
        }
        .product-info {
            margin-top: auto;
            text-align: center;
        }
        @media (max-width: 920px) {
            .product-card {
                flex: 1 21%;
            }
        }
        /* Enlarge the first two items, i.e. have only 2 per row in first row */
        /* This is optional */
        /*
        .products .product-card:first-child, 
        .products .product-card:nth-child(2) {
            flex: 2 46%;
        }
        /*
        /* Make it two items per row on smaller devices */
        @media (max-width: 600px) {
            .product-card {
                flex: 1 46%;
            }
        }
        /* Make it one item per row on smallest devices */
        @media (max-width: 425px) {
            .product-card {
                flex: 1 92%;
            }
        }
