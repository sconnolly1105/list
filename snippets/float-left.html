<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div class="container clearfix">
        <ul class="clearfix"> 
            <li><img src="http://unsplash.it/600/300" alt="An image from the web"></li>
            <li><img src="http://unsplash.it/600/300" alt="An image from the web"></li>
            <li><img src="http://unsplash.it/600/300" alt="An image from the web"></li>
            <li><img src="http://unsplash.it/600/300" alt="An image from the web"></li>
        </ul>
    </div>
</body>
</html>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .container {
        width: 80%;
        margin: 0 auto;
        display: block;
        border: 2px solid red;
        position: relative;
    }
    .container > ul {
        text-align: center;
        margin: 10px auto;
        position: relative;
    }
    .clearfix:after {
        content: '';
        display: table;
        clear: both;

    }
    ul li {
        list-style: none;
        display: inline-block;
        width: calc (50% - 4em);
        margin-bottom: 2em;
        position: relative;
        padding-left: 1em;
    }
    li img {
        max-width: calc(50% - 3em);
        width: calc(50% - 3em);
        min-width: calc(50% - 3em);
    }
    li:nth-child(even) {
        float: left;
    }
    li:nth-child(odd) {
        float: right;
    }
    container ul {
        display: block;
        border: 5px solid green;
        overflow: auto;
    }
    @media screen and (max-width: 600px) {
        ul li {
            width: 100%;
        }
    }
</style>
