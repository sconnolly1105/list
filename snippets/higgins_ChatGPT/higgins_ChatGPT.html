/***** RENDERER: builds <ul>/<li> from JSON, preserving ids and onclick(readXML) *****/
function buildLiFromNode(node) {
  const li = document.createElement("li");
  li.id = node.id;

  if (node.opened === true) {
    li.setAttribute("data-jstree", JSON.stringify({ opened: true }));
  }

  if (node.code) {
    const span = document.createElement("span");
    span.className = "clickable";
    span.setAttribute("onclick", `return readXML('${node.code}')`);
    span.textContent = node.label;
    li.appendChild(span);
  } else {
    li.appendChild(document.createTextNode(node.label));
  }

  if (Array.isArray(node.children) && node.children.length) {
    const ul = document.createElement("ul");
    node.children.forEach(child => ul.appendChild(buildLiFromNode(child)));
    li.appendChild(ul);
  }
  return li;
}

function renderFamilyTreeJSON(rootData, targetUlId = "org") {
  const ul = document.getElementById(targetUlId);
  if (!ul) return;
  ul.innerHTML = "";
  ul.appendChild(buildLiFromNode(rootData));
}

/***** UI helpers kept compatible with your existing flow *****/
function processXMLData(htmlString) {
  // Simple sanitizer for this context: treat as HTML snippet from trusted XML.
  const inner = document.getElementById("inner");
  inner.innerHTML = htmlString && htmlString.trim().length ? htmlString : "No information on this individual.";
  // Show panel
  const outer = document.getElementById("outer");
  if (outer.style.display === "none") outer.style.display = "block";
  return false;
}

function closeDiv() {
  document.getElementById("outer").style.display = "none";
  return false;
}

// Drop-in compatibility shim for legacy code that calls `loadXML(...)`.
window.loadXML = function (arg1, arg2) {
  // If it's a person code (e.g., "H00090"), delegate to readXML(code).
  if (typeof arg1 === 'string' && !/\.xml$/i.test(arg1)) {
    return readXML(arg1);
  }

  // Otherwise treat it as (url, onSuccess?)
  var url = arg1 || "xml/personalInfo1.xml";
  var onSuccess = (typeof arg2 === 'function') ? arg2 : function(){};

  $.ajax({
    type: "GET",
    url: url,
    dataType: "xml",
    success: onSuccess,
    error: function (xhr, status, err) {
      processXMLData(
        "<p><strong>Note:</strong> Could not load <code>" + url +
        "</code> (" + status + ").</p>"
      );
    }
  });
  return false;
};

/***** readXML(code): mirrors your original intent (pulls from xml/personalInfo1.xml and finds <code>...</code>) *****/
function readXML(code) {
  $.ajax({
    type: "GET",
    url: "xml/personalInfo1.xml",
    dataType: "xml",
    success: function(xml){
      var myData = $(xml).find(code).text();
      if (!myData || myData.length === 0) {
        myData = "No information on this individual.";
      }
      processXMLData(myData);
    },
    error: function (xhr, status, thrownError) {
      processXMLData(
        "<p><strong>Note:</strong> Could not load <code>xml/personalInfo1.xml</code> (" +
        status + "). Ensure the XML file is available. You clicked code: <code>" + code + "</code>.</p>"
      );
    }
  });
  return false;
}

      type: "GET",
      url: "xml/personalInfo1.xml",
      dataType: "xml",
      success: function(xml){
        var myData = $(xml).find(data.node.id).text();
        if (!myData || myData.length === 0) {
          myData = "No information on this individual";
        }
        processXMLData(myData);
      },
      error: function (xhr, status, thrownError) {
        processXMLData(
          "<p><strong>Note:</strong> Could not load <code>xml/personalInfo1.xml</code> (" +
          status + "). You selected node id: <code>" + data.node.id + "</code>.</p>"
        );
      }
    });
  });
});
  </script>
</body>
</html>
