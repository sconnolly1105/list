<body>

<button id="down">-</button>
<button id="up">+</button>

<h1>Heading text</h1>
<div>
    <p>A div, with</p>
    <ul>
        <li>Various elements</li>
    </ul>
     <h2>And another heading</h2>

    <aside>At this point, I'm sure that you get the point</aside>
    <blockquote>But if you don't, then I'm sure it can be explained</blockquote>
</div>

<div class="image">

<style>
/* This is more or less irrelevant, it's just to show
   that the <body> element has an explicit font-size,
   in pixels (but em would work also) */
body {
    font-size: 16px;
}
/* and all other elements have relative font-sizes,
   basing their own font-size upon the inherited
   font-size from their ancestors: */
h1 {
    font-size: 2em;
}
div {
    font-size: 1em;
}
ul {
    font-size: 1.2em;
}
h2 {
    font-size: 1.5em;
}
aside {
    font-size: 0.8em;
}
blockquote {
    float: left;
    font-size: 1.2em;
    border-left: 2px solid #f90;
    padding: 0.5em;
}
</style>

<script>

// Get the buttons
const upButton = document.querySelector('#up');
const downButton = document.querySelector('#down');

// Get all elements on the page
const elements = document.querySelectorAll('body *');

// Set the initial font size
let fontSize = 16;

// Add click event listeners to the buttons
upButton.addEventListener('click', () => {
  // Increase the font size by 2
  fontSize += 2;

  // Update the font size of all text nodes
  elements.forEach(element => {
    // Check if the element is a text node
    // if (element.nodeType === Node.TEXT_NODE) {
    //   element.parentElement.style.fontSize = `${fontSize}px`;
    // }
    element.parentElement.style.fontSize = `${fontSize}px`;
  });
});

downButton.addEventListener('click', () => {
  // Decrease the font size by 2
  fontSize -= 2;

  // Update the font size of all text nodes
  elements.forEach(element => {
    // Check if the element is a text node
    // if (element.nodeType === Node.TEXT_NODE) {
    //   element.parentElement.style.fontSize = `${fontSize}px`;
    // }
    element.parentElement.style.fontSize = `${fontSize}px`;
  });
});
