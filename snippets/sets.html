<body>

    <h2>Sets are arrays that do not include duplicates</h2>
    <h4>Check the console</h4>
    
<script>

    const myArr = ['6','7','8'];

    const mySet = new Set(myArr);

    mySet.add ("Sean");
    mySet.add ("Mairead");
    mySet.add ("Eavan");
    mySet.add ("Emmet");
    mySet.add ("Denise");
    mySet.add ("Lisa");
    mySet.add ("Emmet");

    console.log(mySet);

</script>
