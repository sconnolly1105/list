<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slick Carousel Example</title>
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css"/>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

<style>
/* Center the carousel and set its width to 80% of the viewport width */
#slick-carousel {
  margin: 0 auto;
  width: 60%;
}

/* Customize the appearance of the navigation arrows */
.slick-prev,
.slick-next {
  font-size: 24px;
  line-height: 1;
  color: #fff;
  background-color: #333;
  opacity: 0.7;
  z-index: 1;
}

/* .slick-prev:hover,
.slick-next:hover {
  opacity: 1;
} */

/* Ensure arrows remain visible on hover */
.slick-prev:hover,
.slick-next:hover,
.slick-prev:focus,
.slick-next:focus {
  opacity: 1;  /* Maintain full opacity on hover and focus */
  background-color: #333;
}

/* Hide the navigation arrows when at the first or last slide */
.slick-prev.slick-disabled,
.slick-next.slick-disabled {
  display: none !important;
}

.slick-slide img {
    display: block;
    width: 100%;
}

</style>

</head>
<body>

<div id="slick-carousel">
  <div><img src="https://placekitten.com/300/200" alt="Image 1"></div>
  <div><img src="https://placekitten.com/300/201" alt="Image 2"></div>
  <div><img src="https://placekitten.com/300/202" alt="Image 3"></div>
  <div><img src="https://placekitten.com/300/203" alt="Image 4"></div>
  <div><img src="https://placekitten.com/300/204" alt="Image 5"></div>
  <div><img src="https://placekitten.com/300/205" alt="Image 6"></div>
  <div><img src="https://placekitten.com/300/206" alt="Image 7"></div>
  <div><img src="https://placekitten.com/300/207" alt="Image 8"></div>
  <div><img src="https://placekitten.com/300/208" alt="Image 9"></div>
</div>

<script>
$(document).ready(function(){
  $('#slick-carousel').slick({
    dots: true,
    infinite: false,
    speed: 300,
    slidesToShow: 1,
    slidesToScroll: 1,
    autoplay: false,
    arrows: true,
    prevArrow: '<button type="button" class="slick-prev"></button>',
    nextArrow: '<button type="button" class="slick-next"></button>',
    responsive: [
      {
        breakpoint: 768,
        settings: {
          arrows: false,
        }
      }
    ],
    // Custom logic to handle arrow visibility
    onAfterChange: function(currentSlide) {
      var slideCount = $('#slick-carousel').slick('getSlick').slideCount;
      var currentSlideIndex = $('#slick-carousel').slick('slickCurrentSlide');

      if (currentSlideIndex === 0) {
        $('.slick-prev').css('visibility', 'hidden');
      } else {
        $('.slick-prev').css('visibility', 'visible');
      }

      if (currentSlideIndex === slideCount - 1) {
        $('.slick-next').css('visibility', 'hidden');
      } else {
        $('.slick-next').css('visibility', 'visible');
      }
    }
  });
});
</script>

</body>
</html>
